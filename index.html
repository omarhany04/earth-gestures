<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gesture Earth</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

  <style>
    :root {
      color-scheme: dark;
      --panel-bg: rgba(6, 14, 24, 0.72);
      --panel-border: rgba(132, 211, 255, 0.24);
      --panel-text: #d8f0ff;
      --accent: #69d2ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, #10243d 0%, #050910 40%, #010205 100%);
      font-family: "Segoe UI", sans-serif;
    }

    canvas {
      display: block;
    }

    video {
      display: none;
    }

    .hud {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 10;
      width: min(360px, calc(100vw - 36px));
      padding: 14px 16px;
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      color: var(--panel-text);
      line-height: 1.4;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    }

    .hud h1 {
      margin: 0 0 8px;
      font-size: 1.1rem;
      letter-spacing: 0.04em;
    }

    .hud p {
      margin: 0;
      font-size: 0.95rem;
    }

    .hud p + p {
      margin-top: 8px;
    }

    .status {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="hud">
    <h1>Gesture Earth</h1>
    <p>Show one hand to rotate the globe. Show two hands and move them apart or closer to zoom.</p>
    <p id="status" class="status">Starting camera for hand tracking...</p>
  </div>

  <video id="video" playsinline></video>

  <script>
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      2000
    );
    camera.position.set(0, 0, 6);
    const cameraTarget = new THREE.Vector3(0, 0, 0);
    camera.lookAt(cameraTarget);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0x8eb8ff, 0.65);
    scene.add(ambientLight);

    const sunLight = new THREE.PointLight(0xffffff, 1.8, 40);
    sunLight.position.set(8, 4, 10);
    scene.add(sunLight);

    const textureLoader = new THREE.TextureLoader();
    const earthTexture = textureLoader.load(
      "https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg"
    );

    const earth = new THREE.Mesh(
      new THREE.SphereGeometry(2, 64, 64),
      new THREE.MeshStandardMaterial({
        map: earthTexture,
        roughness: 0.95,
        metalness: 0.02
      })
    );
    scene.add(earth);

    const glow = new THREE.Mesh(
      new THREE.SphereGeometry(2.14, 64, 64),
      new THREE.MeshBasicMaterial({
        color: 0x3dbdff,
        transparent: true,
        opacity: 0.12,
        blending: THREE.AdditiveBlending,
        side: THREE.BackSide
      })
    );
    scene.add(glow);

    const starVertices = [];
    for (let i = 0; i < 7000; i += 1) {
      starVertices.push(
        (Math.random() - 0.5) * 1600,
        (Math.random() - 0.5) * 1600,
        (Math.random() - 0.5) * 1600
      );
    }

    const starGeometry = new THREE.BufferGeometry();
    starGeometry.setAttribute(
      "position",
      new THREE.Float32BufferAttribute(starVertices, 3)
    );

    const stars = new THREE.Points(
      starGeometry,
      new THREE.PointsMaterial({
        color: 0xffffff,
        size: 1.1,
        sizeAttenuation: true
      })
    );
    scene.add(stars);

    const video = document.getElementById("video");
    const status = document.getElementById("status");

    const minCameraDistance = 3;
    const maxCameraDistance = 10;
    const rotationVelocity = { x: 0, y: 0 };

    let lastPinchDistance = null;
    let lastSingleHandPoint = null;

    function getCurrentDistance() {
      return camera.position.distanceTo(cameraTarget);
    }

    function setCameraDistance(nextDistance) {
      let offset = camera.position.clone().sub(cameraTarget);

      if (offset.lengthSq() === 0) {
        offset = new THREE.Vector3(0, 0, 1);
      }

      offset.setLength(nextDistance);
      camera.position.copy(cameraTarget).add(offset);
      camera.lookAt(cameraTarget);
    }

    function distance(pointA, pointB) {
      return Math.hypot(pointA.x - pointB.x, pointA.y - pointB.y);
    }

    function getHandAnchor(handLandmarks) {
      const anchor = handLandmarks[9];
      return { x: anchor.x, y: anchor.y };
    }

    function handleSingleHandRotation(handLandmarks) {
      const currentPoint = getHandAnchor(handLandmarks);

      if (lastSingleHandPoint) {
        const deltaX = currentPoint.x - lastSingleHandPoint.x;
        const deltaY = currentPoint.y - lastSingleHandPoint.y;

        rotationVelocity.y = THREE.MathUtils.lerp(
          rotationVelocity.y,
          deltaX * 8,
          0.35
        );
        rotationVelocity.x = THREE.MathUtils.lerp(
          rotationVelocity.x,
          deltaY * 8,
          0.35
        );
      }

      lastSingleHandPoint = currentPoint;
    }

    function handleTwoHandZoom(allHands) {
      const hand1 = getHandAnchor(allHands[0]);
      const hand2 = getHandAnchor(allHands[1]);
      const currentDistance = distance(hand1, hand2);

      if (lastPinchDistance !== null) {
        const delta = currentDistance - lastPinchDistance;
        const nextDistance = THREE.MathUtils.clamp(
          getCurrentDistance() - delta * 12,
          minCameraDistance,
          maxCameraDistance
        );

        setCameraDistance(nextDistance);
      }

      lastPinchDistance = currentDistance;
    }

    function onResults(results) {
      const landmarks = results.multiHandLandmarks || [];

      if (landmarks.length === 1) {
        lastPinchDistance = null;
        handleSingleHandRotation(landmarks[0]);
        status.textContent = "One hand detected: move your hand to rotate the Earth.";
        return;
      }

      if (landmarks.length === 2) {
        lastSingleHandPoint = null;
        handleTwoHandZoom(landmarks);
        status.textContent = "Two hands detected: move them apart to zoom in and closer to zoom out.";
        return;
      }

      lastSingleHandPoint = null;
      lastPinchDistance = null;
      status.textContent = "Show one hand to rotate the Earth or two hands to zoom.";
    }

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.7
    });
    hands.onResults(onResults);

    const mediaPipeCamera = new Camera(video, {
      onFrame: async () => {
        await hands.send({ image: video });
      },
      width: 640,
      height: 480
    });

    async function startHandTracking() {
      try {
        await mediaPipeCamera.start();
        status.textContent = "Camera ready. Show one hand to rotate or two hands to zoom.";
      } catch (error) {
        console.error("Failed to start camera:", error);
        status.textContent = "Camera access was blocked, so gesture controls could not start.";
      }
    }

    startHandTracking();

    function animate() {
      requestAnimationFrame(animate);

      earth.rotation.y += rotationVelocity.y;
      earth.rotation.x = THREE.MathUtils.clamp(
        earth.rotation.x + rotationVelocity.x,
        -1.1,
        1.1
      );
      glow.rotation.copy(earth.rotation);
      stars.rotation.y += 0.00008;
      rotationVelocity.x *= 0.9;
      rotationVelocity.y *= 0.9;
      camera.lookAt(cameraTarget);
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
